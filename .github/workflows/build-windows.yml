name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Qt6 via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 6.6.3 win64_msvc2019_64 --outputdir C:\Qt
        echo "QT6_DIR=C:\Qt\6.6.3\msvc2019_64" >> $env:GITHUB_ENV
        echo "C:\Qt\6.6.3\msvc2019_64\bin" >> $env:GITHUB_PATH

    - name: Install OpenCV via vcpkg
      run: |
        git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        C:\vcpkg\vcpkg.exe install opencv4[core,imgproc,imgcodecs]:x64-windows --recurse
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="C:\Qt\6.6.3\msvc2019_64" `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: Deploy Qt dependencies
      run: |
        C:\Qt\6.6.3\msvc2019_64\bin\windeployqt.exe --release build\Release\SketchMaster.exe

    - name: Copy OpenCV DLLs
      run: |
        Copy-Item "C:\vcpkg\installed\x64-windows\bin\opencv_core*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "C:\vcpkg\installed\x64-windows\bin\opencv_imgproc*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "C:\vcpkg\installed\x64-windows\bin\opencv_imgcodecs*.dll" build\Release\ -ErrorAction SilentlyContinue

    - name: Copy resources
      run: |
        if (Test-Path "resources") {
          Copy-Item -Recurse -Force "resources" "build\Release\resources"
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SketchMaster-Windows
        path: |
          build/Release/SketchMaster.exe
          build/Release/*.dll
          build/Release/resources/
        retention-days: 30
