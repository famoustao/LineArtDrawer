name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache Qt6
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: C:\Qt
        key: qt-6.6.3-msvc2019_64

    - name: Install Qt6 via aqtinstall
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        python -m aqt install-qt windows desktop 6.6.3 win64_msvc2019_64 --outputdir C:\Qt

    - name: Setup Qt environment
      run: |
        echo "QT6_DIR=C:\Qt\6.6.3\msvc2019_64" >> $env:GITHUB_ENV
        echo "C:\Qt\6.6.3\msvc2019_64\bin" >> $env:GITHUB_PATH

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg\installed
          C:\vcpkg\vcpkg.exe
        key: vcpkg-opencv-x64-windows-v1

    - name: Install vcpkg and OpenCV
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        }
        C:\vcpkg\vcpkg.exe install opencv4:x64-windows --recurse

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="C:\Qt\6.6.3\msvc2019_64" `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: Deploy Qt dependencies
      run: |
        C:\Qt\6.6.3\msvc2019_64\bin\windeployqt.exe --release build\Release\SketchMaster.exe

    - name: Copy OpenCV DLLs and plugins
      run: |
        $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
        $vcpkgDir = "C:\vcpkg\installed\x64-windows"
        $outDir = "build\Release"
        Get-ChildItem "$vcpkgBin" -Filter "opencv_*.dll" | Copy-Item -Destination "$outDir" -ErrorAction SilentlyContinue
        if (Test-Path "$vcpkgDir\bin\OpenCV") {
          Copy-Item -Recurse -Force "$vcpkgDir\bin\OpenCV" "$outDir\OpenCV"
        }
        $deps = @("zlib*.dll", "libpng*.dll", "libjpeg*.dll", "libtiff*.dll", 
                  "libwebp*.dll", "libopenjp2*.dll", "lzma*.dll", "zstd*.dll",
                  "tiff*.dll", "jpeg*.dll", "png*.dll", "webp*.dll")
        foreach ($pattern in $deps) {
          Get-ChildItem "$vcpkgBin" -Filter $pattern | Copy-Item -Destination "$outDir" -ErrorAction SilentlyContinue
        }

    - name: Copy resources
      run: |
        if (Test-Path "resources") {
          Copy-Item -Recurse -Force "resources" "build\Release\resources"
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SketchMaster-Windows
        path: |
          build/Release/SketchMaster.exe
          build/Release/*.dll
          build/Release/resources/
        retention-days: 30
