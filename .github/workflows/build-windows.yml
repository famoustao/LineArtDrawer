name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase'
        set-env: true
        install-deps: true

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'f1c6efdefcb33f2d8d97deb810bd5d6c706f48b1'
        runVcpkgInstall: true
      env:
        VCPKG_DEFAULT_TRIPLET: x64-windows

    - name: Install OpenCV via vcpkg
      run: |
        $vcpkgRoot = $env:VCPKG_ROOT
        if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
        & "$vcpkgRoot\vcpkg.exe" install opencv4[core,imgproc,imgcodecs]:x64-windows --recurse

    - name: Configure CMake
      run: |
        $vcpkgRoot = $env:VCPKG_ROOT
        if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${env:Qt6_DIR}" `
          -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot\scripts\buildsystems\vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: Deploy Qt dependencies
      run: |
        $qtBinPath = Split-Path -Parent (Get-Command qmake.exe).Source
        windeployqt.exe --release build\Release\SketchMaster.exe

    - name: Copy OpenCV DLLs
      run: |
        $vcpkgRoot = $env:VCPKG_ROOT
        if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
        $opencvBin = "$vcpkgRoot\installed\x64-windows\bin"
        Copy-Item "$opencvBin\opencv_core*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "$opencvBin\opencv_imgproc*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "$opencvBin\opencv_imgcodecs*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "$opencvBin\opencv_highgui*.dll" build\Release\ -ErrorAction SilentlyContinue

    - name: Copy resources
      run: |
        if (Test-Path "resources") {
          Copy-Item -Recurse -Force "resources" "build\Release\resources"
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SketchMaster-Windows
        path: |
          build/Release/SketchMaster.exe
          build/Release/*.dll
          build/Release/resources/
        retention-days: 30
