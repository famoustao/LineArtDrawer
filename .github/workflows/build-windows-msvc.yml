name: Build Windows Executable (MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-msvc:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtbase'
        set-env: true
        install-deps: true

    - name: Install OpenCV via vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        C:\vcpkg\vcpkg.exe install opencv4[core,imgproc,imgcodecs] --triplet x64-windows
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${env:Qt6_DIR}" `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: Deploy Qt dependencies
      run: |
        $qtBinPath = Split-Path -Parent (Get-Command qmake.exe).Source
        windeployqt.exe --release build\Release\SketchMaster.exe

    - name: Copy OpenCV DLLs
      run: |
        $opencvBin = "C:\vcpkg\installed\x64-windows\bin"
        Copy-Item "$opencvBin\opencv_core*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "$opencvBin\opencv_imgproc*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "$opencvBin\opencv_imgcodecs*.dll" build\Release\ -ErrorAction SilentlyContinue
        Copy-Item "$opencvBin\opencv_highgui*.dll" build\Release\ -ErrorAction SilentlyContinue

    - name: Copy resources
      run: |
        if (Test-Path "resources") {
          Copy-Item -Recurse -Force "resources" "build\Release\resources"
        }

    - name: Create ZIP package
      run: |
        Compress-Archive -Path "build\Release\*" -DestinationPath "SketchMaster-Windows-x64.zip" -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SketchMaster-Windows-x64
        path: SketchMaster-Windows-x64.zip
        retention-days: 30
