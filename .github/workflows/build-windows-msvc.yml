name: Build Windows Executable (MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-msvc:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache Qt6
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: C:\Qt
        key: qt-6.6.3-msvc2019_64

    - name: Install Qt6 via aqtinstall
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        python -m aqt install-qt windows desktop 6.6.3 win64_msvc2019_64 --outputdir C:\Qt

    - name: Setup Qt environment
      run: |
        echo "QT6_DIR=C:\Qt\6.6.3\msvc2019_64" >> $env:GITHUB_ENV
        echo "C:\Qt\6.6.3\msvc2019_64\bin" >> $env:GITHUB_PATH

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg\installed
          C:\vcpkg\vcpkg.exe
        key: vcpkg-opencv-x64-windows-v1

    - name: Install vcpkg and OpenCV
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        }
        C:\vcpkg\vcpkg.exe install opencv4:x64-windows --recurse

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="C:\Qt\6.6.3\msvc2019_64" `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: Deploy Qt dependencies
      run: |
        C:\Qt\6.6.3\msvc2019_64\bin\windeployqt.exe --release build\Release\SketchMaster.exe
        # 确保 platforms 目录被复制
        if (Test-Path "C:\Qt\6.6.3\msvc2019_64\plugins\platforms") {
          if (-not (Test-Path "build\Release\platforms")) {
            New-Item -ItemType Directory -Path "build\Release\platforms" -Force
          }
          Copy-Item -Recurse -Force "C:\Qt\6.6.3\msvc2019_64\plugins\platforms\*" "build\Release\platforms\"
          Write-Host "Copied Qt platforms plugins"
        }
        # 复制其他必要的 Qt 插件目录
        $qtPlugins = @("imageformats", "iconengines", "styles")
        foreach ($plugin in $qtPlugins) {
          if (Test-Path "C:\Qt\6.6.3\msvc2019_64\plugins\$plugin") {
            if (-not (Test-Path "build\Release\$plugin")) {
              New-Item -ItemType Directory -Path "build\Release\$plugin" -Force
            }
            Copy-Item -Recurse -Force "C:\Qt\6.6.3\msvc2019_64\plugins\$plugin\*" "build\Release\$plugin\"
            Write-Host "Copied Qt plugin: $plugin"
          }
        }

    - name: Copy ALL vcpkg DLLs to output
      run: |
        $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
        $outDir = "build\Release"
        Get-ChildItem "$vcpkgBin" -Filter "*.dll" | ForEach-Object {
          Copy-Item $_.FullName -Destination "$outDir" -ErrorAction SilentlyContinue
        }
        $vcpkgDir = "C:\vcpkg\installed\x64-windows"
        if (Test-Path "$vcpkgDir\bin\OpenCV") {
          Copy-Item -Recurse -Force "$vcpkgDir\bin\OpenCV" "$outDir\OpenCV"
        }

    - name: Copy resources, scripts and model directories
      run: |
        if (Test-Path "resources") {
          Copy-Item -Recurse -Force "resources" "build\Release\resources"
        }
        if (Test-Path "scripts") {
          Copy-Item -Recurse -Force "scripts" "build\Release\scripts"
        }
        # 创建模型目录结构（模型文件本身因体积太大不包含在仓库中）
        if (-not (Test-Path "build\Release\models\hed")) {
          New-Item -ItemType Directory -Path "build\Release\models\hed" -Force
        }
        if (-not (Test-Path "build\Release\models\mlsd")) {
          New-Item -ItemType Directory -Path "build\Release\models\mlsd" -Force
        }
        # 复制模型 README 和下载脚本
        if (Test-Path "models\hed\README.md") {
          Copy-Item -Force "models\hed\README.md" "build\Release\models\hed\README.md"
        }
        if (Test-Path "models\mlsd\README.md") {
          Copy-Item -Force "models\mlsd\README.md" "build\Release\models\mlsd\README.md"
        }
        if (Test-Path "models\download_models.bat") {
          Copy-Item -Force "models\download_models.bat" "build\Release\models\download_models.bat"
        }
        Write-Host "模型目录结构已创建（模型文件需用户自行下载）"

    - name: Create ZIP package
      run: |
        Compress-Archive -Path "build\Release\*" -DestinationPath "SketchMaster-Windows-x64.zip" -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SketchMaster-Windows-x64
        path: SketchMaster-Windows-x64.zip
        retention-days: 30
